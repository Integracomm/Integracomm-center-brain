# Painel Integracomm IA — app + Postgres + Caddy (HTTPS automático).
# Rodar da RAIZ do projeto no servidor:
#     docker compose -f deploy/docker-compose.yml up -d
# Variáveis DOMAIN e DB_PASSWORD vêm do .env da raiz (compose lê do CWD).
services:
  db:
    image: postgres:18
    restart: unless-stopped
    # rollback local (app usa o RDS); limitado p/ nunca disputar RAM com o app
    mem_limit: 384m
    environment:
      POSTGRES_USER: integracomm_app
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: integracomm_ia
    volumes:
      - pgdata:/var/lib/postgresql   # pg 18+: mount é a pasta pai, a imagem cria a subpasta versionada
      - ./restore:/restore            # dump do banco local (só usado no 1º boot)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U integracomm_app -d integracomm_ia"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    # APP_DATABASE_URL vem do .env da raiz -> RDS (unificação 10/07/26; antes
    # apontava p/ o postgres em contêiner abaixo, mantido só como rollback)
    env_file: ../.env
    # OOM de 11-13/07: a rodada diária chega a ~1,4 GB RSS e, sem teto, sufocou
    # o host inteiro (SSH/Caddy/Postgres). Teto de RAM + excedente vai p/ swap
    # (host tem swapfile 2G desde 13/07) — o app pode passar do teto SEM
    # derrubar a máquina; o pior caso vira lentidão, não queda.
    mem_limit: 1400m
    memswap_limit: 3g
    volumes:
      - ../.env:/app/.env:ro          # o app lê o .env da raiz do projeto
      - ../data:/app/data             # caches offline (wa_analyses etc.) + logs de análise
      - ../logs:/app/logs
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    mem_limit: 192m
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data              # certificados Let's Encrypt (persistir!)
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
